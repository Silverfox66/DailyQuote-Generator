<script type="text/babel">
function App() {
  const [quotes, setQuotes] = React.useState([]);
  const [current, setCurrent] = React.useState({
    text: "Loading...",
    author: "..."
  });

  const getQuotes = () => {
    fetch("https://random-quote-machine.freecodecamp.rocks/api/quotes")
      .then(res => res.json())
      .then(data => {
        setQuotes(data);
        pickRandom(data);
      })
      .catch(() => {
        setCurrent({
          text: "Failed to load quotes",
          author: "System"
        });
      });
  };

  const pickRandom = (data) => {
    const random = data[Math.floor(Math.random() * data.length)];
    setCurrent({
      text: random.quote,
      author: random.author
    });
  };

  const newQuote = () => {
    pickRandom(quotes);
  };

  React.useEffect(() => {
    getQuotes();
  }, []);

  const tweetUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(
    `"${current.text}" - ${current.author}`
  )}`;

  return (
    <div id="quote-box" style={{
      width: "400px",
      margin: "100px auto",
      padding: "20px",
      background: "white",
      borderRadius: "10px",
      textAlign: "center"
    }}>
      <p id="text">{current.text}</p>
      <p id="author">- {current.author}</p>

      <button id="new-quote" onClick={newQuote}>
        New Quote
      </button>

      <br /><br />

      <a
        id="tweet-quote"
        href={tweetUrl}
        target="_blank"
        rel="noopener noreferrer"
      >
        Tweet
      </a>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>

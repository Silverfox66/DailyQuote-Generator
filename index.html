<script type="text/babel">
function App() {
  const [quote, setQuote] = React.useState({
    text: "Loading...",
    author: "..."
  });

  const getNewQuote = () => {
    fetch("https://api.quotable.io/random")
      .then(res => res.json())
      .then(data => {
        setQuote({
          text: data.content,
          author: data.author
        });
      })
      .catch(() => {
        setQuote({
          text: "Error loading quote",
          author: "System"
        });
      });
  };

  React.useEffect(() => {
    getNewQuote();
  }, []);

  const tweetUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(
    `"${quote.text}" - ${quote.author}`
  )}`;

  return (
    <div id="quote-box" style={{
      width: "400px",
      margin: "100px auto",
      padding: "20px",
      background: "white",
      borderRadius: "10px",
      textAlign: "center"
    }}>
      <p id="text">{quote.text}</p>
      <p id="author">- {quote.author}</p>

      <button id="new-quote" onClick={getNewQuote}>
        New Quote
      </button>

      <br /><br />

      <a
        id="tweet-quote"
        href={tweetUrl}
        target="_blank"
        rel="noopener noreferrer"
      >
        Tweet
      </a>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
